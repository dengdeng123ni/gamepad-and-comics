<div class="list" >
    <button mat-button
    class="item"
    (click)="use('en')"
    [attr._id]="'language_setting_en'"
    [attr.select]="true"
    [attr.default]="false"
    [attr.region]="'language_setting'"
    [attr.content_menu_key]="'language_setting_en'"
    [attr.content_menu_value]="'language_setting_en'"
    [attr.gamepad_movable_region]="{'up':'settings'} | json"
    >
        <div mat-button class="value">English</div>
        <!-- 英语 -->
    </button>
