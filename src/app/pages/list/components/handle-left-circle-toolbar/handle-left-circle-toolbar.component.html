  <div class="circularity_toolabr">

      <div class="outer-wire"></div>
      <div class='outer-select'>
        <div class='triangle' (click)="on(index)">
        </div>
      </div>
      <div class="outer-wire" style="transform: rotate(30deg)"></div>
      <div class="outer-wire" style="transform: rotate(60deg)"></div>
      <div class="outer-wire" style="transform: rotate(90deg)"></div>

    <div class="inner">
      <div class='inner-select' style="transform: rotate(0deg);">
        <div class='inner-triangle'>
        </div>
      </div>
      <button mat-icon-button matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
        [matTooltip]="i18n.config.all_chapters" class="icon icon-1" [attr._id]="'handel_toolabr_center_8'"
        [attr.region]="'handel_toolabr_center'" [attr.select]="true" (click)="editIsToggle($event)">
        <mat-icon>edit_note</mat-icon>
      </button>
      <button mat-icon-button matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
        [matTooltip]="i18n.config.thumbnail" class="icon icon-2" [attr._id]="'handel_toolabr_center_7'"
        [attr.region]="'handel_toolabr_center'" (click)="uploadSelectOpen($event)">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>
  <div class="list handle_reader_circle_toolbar_left">

    <button mat-icon-button matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
      [matTooltip]="i18n.config.export_ppt" class="icon create_pdf" (click)="LanguageSettings.open()"
      [attr.region]="'handel_toolabr_left'" [attr._id]="'handel_toolabr_left_1'">
      <mat-icon>g_translate</mat-icon>
    </button>
    <button mat-icon-button matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
      [matTooltip]="i18n.config.export_image" class="icon" (click)="SoftwareInformation.open()"
      [attr.region]="'handel_toolabr_left'">
      <mat-icon>help</mat-icon>
    </button>
  </div>
  <div class="list handle_reader_circle_toolbar_right">
    <button cdkFocusInitial matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
      [matTooltip]="i18n.config.full_screen" mat-icon-button class="icon"
      (click)="isfullscreen?isFullChange('window'):isFullChange('full_screen')"
      [attr.region]="'handel_toolabr_right'" [attr._id]="'handel_toolabr_right_1'">
      <mat-icon *ngIf="isfullscreen">fullscreen_exit</mat-icon>
      <mat-icon *ngIf="!isfullscreen">fullscreen</mat-icon>
    </button>
    <button mat-icon-button class="icon" matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
      [matTooltip]="i18n.config.hide_cursor" (click)="cursorChange();"
      [attr.region]="'handel_toolabr_right'">
      <mat-icon>play_disabled</mat-icon>
    </button>
    <button mat-icon-button class="icon" matTooltipPosition="right" [matTooltipShowDelay]="i18n.tooltipShowDelay"
    [matTooltip]="i18n.config.close_the_handle" (click)="handelClose();HandleLeftCircleToolbar.close()"
    [attr.region]="'handel_toolabr_right'">
    <mat-icon>videogame_asset_off</mat-icon>
    </button>
  </div>
  <!-- <div class="name">全屏</div> -->
</div>
