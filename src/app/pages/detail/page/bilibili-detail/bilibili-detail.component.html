<mat-drawer-container class="w-full h-full" autosize>
  <div class=" w-full h-full flex">
    <div class="bilibili_info">
      <div class="toolabr">
        <button mat-icon-button matTooltipPosition="below" [matTooltipShowDelay]="i18n.tooltipShowDelay" [matTooltip]="i18n.config.back" class="icon" (click)="back()" [attr.region]="'back'"> <mat-icon>chevron_left</mat-icon></button>
        <button mat-button  (click)="continue($event)" [matTooltipShowDelay]="3000" [matTooltip]="i18n.config.continue" [disabled]="comics.chapters.length==0" [attr.region]="'continue'" id="continue" [attr.select]="true" [attr.default]="true" >{{i18n.config.continue}}</button>
        <!-- matTooltipPosition="below" [matTooltipShowDelay]="i18n.tooltipShowDelay" [matTooltip]="comics.chapter.title"  -->
      </div>
      <div class="img" (click)="continue($event)" >
        <img loading="lazy" [src]="comics.cover" alt="">
      </div>
      <div class="info">
        <div class="title">{{comics.title}}</div>
        <div class="author">{{comics.author}}</div>
        <div class="intro">
          {{comics.intro}}
        </div>
      </div>
    </div>
    <div class="flex flex-col h-full justify-between" style="padding: 2.5vh 0;">
      <div class="detail_section">
        <app-info-short></app-info-short>
        <div class="warp">
          <div class="title">
            {{ i18n.config.all_chapters }}({{ comics.chapters.length }})
            <!-- <span style="font-size: 0.75rem; line-height: 1rem; color: rgba(255, 255, 255, 0.34); text-align: left;">{{title}}</span> -->
          </div>
          <div
            class="list"
            [attr.mode]="'list'"
            [attr.type]="'list'"
          >
            <button
              class="item"
              (click)="on($event, n)"
              [id]="n.id"
              [attr._id]="'section_item_' + n.id"
              [attr.region]="'section_item'"
              [attr.multiple]="n.selected"
              [attr.content_menu_key]="'section_item'"
              [attr.content_menu_value]="n.id"
              [matTooltipShowDelay]="5000"
              [matTooltip]="n.title"
              mat-button
              *ngFor="let n of comics.chapters"
            >
              <div class="flex w-full">
                <img loading="lazy" [src]="n.cover" alt="" />
                <div class="info">
                  <div
                    class="name"
                    [attr.read]="!!n.lastReadTime"
                  >
                    {{ n.title }}
                  </div>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</mat-drawer-container>
