<mat-drawer-container class="w-full h-full overflow-hidden" autosize>
  <mat-drawer [opened]="left" mode="over" style="min-width: 192px;" id="scroll" (closedStart)="closedStart()">
    <div class="images">
      <div class="item" style="position: relative;" *ngFor="let item of chapters[index].images;let index=index">
        <img [src]="item.src" alt="">
        <span style="    position: absolute;
        background: #fff;
        padding: 1px 4px;
        left: 4px;
        bottom: 4px;
        color: #000;
        border-radius: 4px;">{{item.millisecond}} 秒</span>
        <mat-chip-listbox class="info">
          <mat-chip-option class="reading-time" *ngFor="let n of item.readingTimes ">{{n.millisecond}}秒 {{n.startTime | date:'MM-dd HH:mm:ss'}}</mat-chip-option>
        </mat-chip-listbox>
      </div>
    </div>
  </mat-drawer>
  <div class="warp opacity-0" id="reading_time">
    <div class="cover">
      <img [src]="current.comics.cover.src">
      <div class="title">{{current.comics.title}}</div>
      <div class="reading-time">{{cover.minutes}} 分钟</div>
    </div>
    <div class="chapters">
      <button mat-button class="item" [attr.select]="item.id==current.comics.chapter.id" [attr.region]="'reading_time'"
        [id]="item.id" *ngFor="let item of chapters;let index=index" (click)="open(index)">
        <img [src]="item.images[0].small" alt="">
        <div class="info">
          <div class="name">{{item.title}}</div>
          <div class="reading-time">{{item.minutes}} 分钟</div>
        </div>
      </button>
    </div>
  </div>
</mat-drawer-container>
