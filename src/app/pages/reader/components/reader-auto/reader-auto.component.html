<div style="position: fixed; z-index: 1; " [attr.position]="config.reader_auto.position">
  <div class="warp">
    <mat-spinner [diameter]="24" [value]="progress" mode="determinate"></mat-spinner>
    <button mat-icon-button class="icon" (click)="change()">
      <mat-icon *ngIf="!isPause">pause</mat-icon>
      <mat-icon *ngIf="isPause">play_arrow</mat-icon>
    </button>
  </div>
</div>
